worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream url_shortener_api {
    # least_conn: prefer the instance with fewer active connections
    least_conn;
    # Open-source Nginx has no active health checks — it only learns
    # a backend is down after failed proxy attempts. max_fails +
    # fail_timeout mark a server temporarily unavailable so traffic
    # shifts to healthy peers instead of hammering a crashed one.
    server api1:3000 max_fails=3 fail_timeout=30s;
    server api2:3000 max_fails=3 fail_timeout=30s;
  }

  server {
    listen 80;

    location /health {
      proxy_pass http://url_shortener_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://url_shortener_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
