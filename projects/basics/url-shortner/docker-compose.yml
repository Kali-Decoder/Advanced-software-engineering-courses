services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api1:
    build: .
    environment:
      PORT: 3000
      WORKER_ID: 1
      DATABASE_URL: postgres://shortener:shortener@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 86400
      BASE_URL: http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api2:
    build: .
    environment:
      PORT: 3000
      WORKER_ID: 2
      DATABASE_URL: postgres://shortener:shortener@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 86400
      BASE_URL: http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

volumes:
  pgdata:
