services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api1:
    build: .
    environment:
      PORT: 3000
      WORKER_ID: 1
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_CAPACITY: 10
      RATE_LIMIT_REFILL_PER_SEC: 0.5
    depends_on:
      redis:
        condition: service_healthy

  api2:
    build: .
    environment:
      PORT: 3000
      WORKER_ID: 2
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_CAPACITY: 10
      RATE_LIMIT_REFILL_PER_SEC: 0.5
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
